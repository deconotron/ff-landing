  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark:   #1C1917;
      --mid:    #292524;
      --gray:   #78716C;
      --line:   #E7E5E4;
      --orange: #F97316;
      --white:  #FAFAF9;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--white);
      color: var(--dark);
      font-family: 'Space Grotesk', sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── STAGGER ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .anim { opacity: 0; animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
    .anim-1 { animation-delay: 0.1s; }
    .anim-2 { animation-delay: 0.25s; }
    .anim-3 { animation-delay: 0.4s; }
    .anim-4 { animation-delay: 0.55s; }
    .anim-5 { animation-delay: 0.7s; }

    /* ── TOP: white, logo ── */
    .top {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 24px;
      background: var(--white);
      position: relative;
      z-index: 2;
    }

    .top img {
      height: 52px;
      width: auto;
      display: block;
    }

    /* ── BOTTOM: grid zone ── */
    .bottom {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 56px 24px 72px;
      border-top: 1px solid var(--line);
    }

    /* grid lines */
    .bottom::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* orange glow at bottom-center */
    .bottom::after {
      content: '';
      position: absolute;
      bottom: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse, rgba(249,115,22,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .bottom-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 52px;
      max-width: 680px;
      width: 100%;
    }

    /* ── TITLE ── */
    .title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .title h1 {
      font-size: clamp(52px, 8vw, 96px);
      font-weight: 700;
      letter-spacing: -0.035em;
      line-height: 0.95;
      color: var(--dark);
    }

    /* italic serif word as contrast */
    .title h1 .serif {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-weight: 400;
      color: var(--orange);
      letter-spacing: -0.02em;
    }

    .title .sub {
      margin-top: 20px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gray);
    }

    /* ── FORM ── */
    .form-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .form-label {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--dark);
    }

    .form-row {
      display: flex;
      width: 100%;
      max-width: 440px;
    }

    .form-row input {
      flex: 1;
      background: var(--white);
      border: 1.5px solid #D4D0CE;
      border-right: none;
      color: var(--dark);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      padding: 13px 18px;
      outline: none;
      min-width: 0;
      transition: border-color 0.2s;
    }

    .form-row input::placeholder { color: #C1BBB7; }
    .form-row input:focus { border-color: var(--orange); }

    .form-row button {
      background: var(--dark);
      color: var(--white);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 13px 22px;
      border: 1.5px solid var(--dark);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }

    .form-row button:hover {
      background: var(--orange);
      border-color: var(--orange);
    }

    .form-note {
      font-size: 12px;
      color: #B8B0AA;
      letter-spacing: 0.02em;
    }

    /* ── FOOTER LINE ── */
    .footer {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C1BBB7;
      z-index: 1;
      white-space: nowrap;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .top { padding: 40px 24px 28px; }
      .top img { width: 110px; }
      .bottom { padding: 40px 24px 60px; }
      .form-row { flex-direction: column; }
      .form-row input { border-right: 1.5px solid #D4D0CE; border-bottom: none; }
      .form-row button { padding: 14px; }
    }
  </style>
</head>
